spring:
  application:
    name: marketpulse

  datasource:
    url: jdbc:postgresql://localhost:5432/marketpulse
    username: postgres
    password: ${POSTGRES_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

alphavantage:
  api-key: ${ALPHAVANTAGE_API_KEY}
  base-url: https://www.alphavantage.co/query